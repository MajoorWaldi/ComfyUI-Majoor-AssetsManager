minimum_pre_commit_version: "3.6.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: check-no-bom
        name: Check text files encoding (UTF-8, no BOM)
        entry: python scripts/check_no_bom.py mjr_am_backend mjr_am_shared tests scripts docs .github README.md CHANGELOG.md __init__.py pyproject.toml mypy.ini pytest.ini tox.ini .pre-commit-config.yaml
        language: system
        pass_filenames: false

      - id: ruff
        name: Ruff
        entry: python -m ruff check
        language: system

      - id: mypy
        name: Mypy (manual / pre-push)
        entry: python -m mypy --config-file mypy.ini
        language: system
        pass_filenames: false
        stages: [commit, pre-push, manual]

      - id: quality-gate
        name: Quality gate (manual / pre-push)
        entry: python scripts/run_quality_gate.py --python-only --skip-tests
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
