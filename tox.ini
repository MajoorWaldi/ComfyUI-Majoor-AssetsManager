[tox]
envlist = quality, py310, py311, py312, py313
skipsdist = True
skip_missing_interpreters = True

[testenv:quality]
deps =
    .[dev]
    -rrequirements.txt
commands =
    python scripts/run_quality_gate.py --python-only --skip-tests

[testenv]
deps =
    -rrequirements.txt
    .[dev]
commands =
    python -m pytest -q
